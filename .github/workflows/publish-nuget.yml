name: Publish NuGet Package

'on':
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore library
        run: dotnet restore ./Groenteboer.Technova/Groenteboer.Technova.csproj

      - name: Build library
        run: dotnet build ./Groenteboer.Technova/Groenteboer.Technova.csproj --configuration Release --no-restore

      - name: Pack library
        run: dotnet pack ./Groenteboer.Technova/Groenteboer.Technova.csproj --configuration Release --no-build --output ./artifacts

      - name: Login to NuGet.org
        uses: NuGet/login@v1
        id: login
        with:
          user: markvanmeerten

      - name: Publish package
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate